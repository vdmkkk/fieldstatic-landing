# ===== fieldstatic.shop (landing page + waitlist) =====
# Appended to /root/courses-edge-nginx.conf. The app container listens on
# 127.0.0.1:18090. Does not touch any courses.salut.uno server block.

server {
    listen 80;
    server_name fieldstatic.shop www.fieldstatic.shop;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name fieldstatic.shop www.fieldstatic.shop;
    client_max_body_size 2m;

    ssl_certificate /etc/letsencrypt/live/fieldstatic.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fieldstatic.shop/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # redirect www -> apex
    if ($host = www.fieldstatic.shop) {
        return 301 https://fieldstatic.shop$request_uri;
    }

    location / {
        proxy_pass http://127.0.0.1:18090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
